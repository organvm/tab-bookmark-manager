name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Node.js/Express REST API (lint + Jest tests).
  # Tests run with NODE_ENV=test, which swaps PostgreSQL for in-memory SQLite
  # and mocks the Bull/Redis queues, so no external services are needed.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 18.x, 20.x, 22.x ]
    env:
      NODE_ENV: test
      JWT_SECRET: testsecret
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x' && hashFiles('backend/coverage/lcov.info') != ''
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # ML service — Python/Flask NLP service.
  # No test suite ships yet, so we gate on byte-compilation (build) plus a
  # focused lint that flags real errors (syntax / undefined names) only.
  # The heavy ML deps (torch, transformers, spaCy) are intentionally not
  # installed here — they are multi-GB and unnecessary for static checks.
  # ---------------------------------------------------------------------------
  ml-service:
    name: ML service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff

      - name: Byte-compile sources (build)
        run: python -m compileall -q src

      - name: Lint with Ruff (errors only)
        run: ruff check --select E9,F63,F7,F82 src

  # ---------------------------------------------------------------------------
  # Extension — Chrome MV3 (no build step). Validate the manifest is parseable
  # and that every service-worker / content / popup script is syntactically OK.
  # ---------------------------------------------------------------------------
  extension:
    name: Extension (MV3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20.x

      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('manifest.json is valid JSON')"

      - name: Syntax-check extension scripts
        run: |
          for f in background/background.js content/content.js popup/popup.js; do
            echo "Checking $f"
            node --check "$f"
          done
